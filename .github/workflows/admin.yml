name: Admin

on:
  push:
    paths:
      - "**"
      - ".github/workflows/admin.yml"
  pull_request:
    paths:
      - "**"
      - ".github/workflows/admin.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SESSION_SECRET: ci-session-secret-at-least-32-characters
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
